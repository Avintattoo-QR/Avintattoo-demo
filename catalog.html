---
layout: default
title: קטלוג תכשיטים - בוטיק פירסינג
permalink: /catalog/
---

<section class="py-12 bg-white">
  <div class="max-w-7xl mx-auto px-6">
    <div class="text-center mb-16">
      <h1 class="text-4xl md:text-5xl font-black mb-4">בוטיק פירסינג</h1>
      <p class="text-gray-600 max-w-2xl mx-auto italic">קולקציית תכשיטים ייחודית בסטנדרט רפואי (Titanium G23). לפרטים והזמנה ב-WhatsApp לחצו על הפריט.</p>
    </div>

    <div class="flex flex-wrap justify-center gap-4 mb-12" id="filter-container">
      <button onclick="filterProducts('all')" class="px-6 py-2 rounded-full bg-black text-white font-bold">הכל</button>
      <button onclick="filterProducts('טיטניום')" class="px-6 py-2 rounded-full bg-gray-100 hover:bg-gold hover:text-white transition-all font-bold">טיטניום</button>
      <button onclick="filterProducts('ציפוי זהב')" class="px-6 py-2 rounded-full bg-gray-100 hover:bg-gold hover:text-white transition-all font-bold">ציפוי זהב</button>
    </div>

    <div id="catalog-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
      <div class="animate-pulse bg-gray-100 h-80 rounded-3xl"></div>
      <div class="animate-pulse bg-gray-100 h-80 rounded-3xl"></div>
      <div class="animate-pulse bg-gray-100 h-80 rounded-3xl"></div>
      <div class="animate-pulse bg-gray-100 h-80 rounded-3xl"></div>
    </div>
  </div>
</section>

<script>
// פונקציה למשיכת הנתונים מהגוגל שייטס
async function fetchCatalog() {
    // כאן תכניס את ה-URL של ה-Web App מהסקריפט של הגוגל שייטס
    const scriptURL = 'YOUR_GOOGLE_SCRIPT_WEB_APP_URL'; 
    
    try {
        const response = await fetch(scriptURL);
        const data = await response.json();
        renderProducts(data);
    } catch (error) {
        console.error('Error fetching catalog:', error);
        document.getElementById('catalog-grid').innerHTML = '<p class="text-center col-span-full">שגיאה בטעינת המוצרים. אנא נסו שוב מאוחר יותר.</p>';
    }
}

function renderProducts(products) {
    const grid = document.getElementById('catalog-grid');
    grid.innerHTML = ''; // ניקוי הסקלטון

    products.forEach(product => {
        const productHTML = `
            <div class="group relative bg-white border border-gray-100 rounded-3xl overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-500 transform hover:-translate-y-2" data-category="${product.material}">
                <div class="aspect-square overflow-hidden bg-gray-50">
                    <img src="${product.image_url}" alt="${product.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                </div>
                <div class="p-6">
                    <span class="text-xs font-bold text-gold tracking-widest uppercase">${product.material}</span>
                    <h3 class="text-xl font-bold mt-1 mb-2">${product.name}</h3>
                    <p class="text-gray-500 text-sm mb-4">מק"ט: ${product.sku}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-2xl font-black text-black">₪${product.price}</span>
                        <a href="https://wa.me/972537239660?text=${encodeURIComponent('היי אבי, אני מעוניין במוצר: ' + product.name + ' (מק״ט: ' + product.sku + ')')}" 
                           class="bg-whatsapp text-white p-3 rounded-2xl hover:scale-110 transition-transform shadow-lg">
                           <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                        </a>
                    </div>
                </div>
            </div>
        `;
        grid.innerHTML += productHTML;
    });
}

function filterProducts(category) {
    const cards = document.querySelectorAll('#catalog-grid > div');
    cards.forEach(card => {
        if (category === 'all' || card.getAttribute('data-category').includes(category)) {
            card.style.display = 'block';
        } else {
            card.style.display = 'none';
        }
    });
}

// הפעלה בטעינת הדף
fetchCatalog();
</script>
