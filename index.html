---
layout: default
---
<section class="relative min-h-screen flex items-center justify-center bg-black overflow-hidden">
  <div class="absolute inset-0 z-0">
    <video autoplay muted loop playsinline class="w-full h-full object-cover opacity-40">
      <source src="https://path-to-your-video.mp4" type="video/mp4">
    </video>
    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black"></div>
  </div>

  <div class="relative z-10 text-center px-4 max-w-5xl w-full">
    <h1 class="text-7xl md:text-9xl font-black text-white mb-2 tracking-tighter">AVI TATTOOS</h1>
    <p class="text-xl text-gold font-light tracking-[0.5em] mb-16 uppercase">Art & Piercing Boutique</p>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
      <a href="{{ '/home/' | relative_url }}" class="glass p-8 rounded-3xl hover:bg-white hover:text-black transition duration-500 group">
        <h3 class="text-2xl font-bold mb-2 text-white group-hover:text-black">האתר המלא</h3>
        <p class="text-sm opacity-60">הסטודיו, גלריות ומידע</p>
      </a>
      <a href="{{ '/catalog/' | relative_url }}" class="glass p-8 rounded-3xl border-gold/30 hover:bg-gold hover:text-black transition duration-500 group">
        <h3 class="text-2xl font-bold mb-2 text-gold group-hover:text-black">קטלוג</h3>
        <p class="text-sm opacity-60">תכשיטי יוקרה ופירסינג</p>
      </a>
      <a href="{{ '/blog/tattoos/' | relative_url }}" class="glass p-8 rounded-3xl hover:bg-white hover:text-black transition duration-500 group">
        <h3 class="text-2xl font-bold mb-2 text-white group-hover:text-black">בלוג קעקועים</h3>
        <p class="text-sm opacity-60">השראה וטיפול נכון</p>
      </a>
      <a href="{{ '/blog/piercing/' | relative_url }}" class="glass p-8 rounded-3xl hover:bg-white hover:text-black transition duration-500 group">
        <h3 class="text-2xl font-bold mb-2 text-white group-hover:text-black">בלוג פירסינג</h3>
        <p class="text-sm opacity-60">כל מה שצריך לדעת</p>
      </a>
    </div>
  </div>
</section>
